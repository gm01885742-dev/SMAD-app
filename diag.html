<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAD 1.1 診斷中</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 500px; margin-top: 20px; padding-bottom: 50px; }
        .step-title { color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); padding-left: 12px; margin: 25px 0 12px 0; }
        .btn-submit { background: var(--cbe-primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" onclick="history.back()"><i class="bi bi-chevron-left"></i> SMAD 1.1 S</span>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0 p-4">
            <div id="welcomeMessage" class="alert alert-info small">正在載入診斷模版...</div>

            <div class="step-title">Where－空間與尺度</div>
            <select class="form-select mb-2" id="scale">
                <option value="urban">都市尺度</option>
                <option value="building">建築尺度</option>
                <option value="interior" selected>室內尺度</option>
            </select>
            <input type="text" class="form-control" placeholder="輸入具體空間名稱">

            <div class="step-title">What－問題感知 (風/熱環境)</div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="env" id="e1">
                <label class="form-check-label" for="e1">風環境 (Wind)</label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="env" id="e2">
                <label class="form-check-label" for="e2">熱環境 (Thermal)</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="env" id="e3" checked>
                <label class="form-check-label" for="e3">風環境與熱環境 (Coupled)</label>
            </div>

            <hr>
            <div class="form-check"><input class="form-check-input" type="checkbox"><label class="form-check-label">熱累積 / 悶熱</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox"><label class="form-check-label">風切現象 / 局部強風</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox"><label class="form-check-label">氣流死角 / 換氣不足</label></div>

            <div class="step-title">How－使用行為 (Source)</div>
            <textarea class="form-control" rows="3" placeholder="描述開窗習慣或問題來源..."></textarea>

            <button class="btn btn-submit" onclick="alert('診斷報告已生成！\nDeveloper: Liwei, Tsai')">提交診斷報告</button>
        </div>
    </div>

    <script>
        // 取得網址中的角色資訊
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        const msgBox = document.getElementById('welcomeMessage');
        
        if(role === 'designer') msgBox.innerText = "針對【設計/建築師】優化的診斷模版";
        else if(role === 'manager') msgBox.innerText = "針對【營建/管理端】優化的診斷模版";
        else msgBox.innerText = "SMAD 1.1 標準診斷模版";
    </script>
</body>
</html>
