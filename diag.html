<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAD 1.1 需求診斷</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 500px; margin-top: 20px; padding-bottom: 50px; }
        .step-title { 
            color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); 
            padding-left: 12px; margin: 25px 0 12px 0; font-size: 1.1rem;
        }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-submit { 
            background: var(--cbe-primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; width: 100%; margin-top: 30px; 
        }
        .suggestion-box {
            background-color: #fff9db; border: 1px solid #ffec99; border-radius: 12px;
            padding: 15px; margin-bottom: 20px; font-size: 0.9rem; color: #664d03;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background-color: var(--cbe-primary);">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" onclick="history.back()">
                <i class="bi bi-chevron-left"></i> SMAD 1.1 S | 診斷
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="card p-4">
            <div id="roleSuggestion" class="suggestion-box">
                <i class="bi bi-lightbulb-fill"></i> 正在根據您的身份生成建議...
            </div>

            <form id="diagForm">
                <div class="step-title"><i class="bi bi-geo-alt-fill"></i> Where－空間與尺度</div>
                <select class="form-select mb-2" id="scale">
                    <option value="urban">都市尺度 (Urban)</option>
                    <option value="building">建築尺度 (Building)</option>
                    <option value="interior" selected>室內尺度 (Interior)</option>
                </select>
                <input type="text" class="form-control" id="location" placeholder="輸入具體空間名稱 (如：社區中庭)">

                <div class="step-title"><i class="bi bi-search"></i> What－問題感知 (Situation)</div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="env_type" id="e1" value="wind">
                    <label class="form-check-label" for="e1">風環境 (Wind Environment)</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="env_type" id="e2" value="thermal">
                    <label class="form-check-label" for="e2">熱環境 (Thermal Environment)</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="env_type" id="e3" value="coupled" checked>
                    <label class="form-check-label" for="e3">風環境與熱環境 (Coupled Analysis)</label>
                </div>

                <div class="form-check"><input class="form-check-input" type="checkbox" id="w1"><label class="form-check-label">熱累積 / 局部悶熱</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="w2"><label class="form-check-label">風切現象 / 局部強風</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="w3"><label class="form-check-label">氣流死角 / 換氣不足</label></div>

                <div class="step-title"><i class="bi bi-gear-fill"></i> How－使用行為 (Source)</div>
                <textarea class="form-control" id="how" rows="3" placeholder="描述開窗習慣或問題來源..."></textarea>

                <button type="button" class="btn btn-submit" onclick="submitDiagnostic()">提交診斷報告</button>
            </form>
        </div>

        <div class="text-center mt-4 small text-muted">
            Developer: CBE studio | Liwei, Tsai<br>
            <a href="https://www.cbesstudio.com/" target="_blank" style="color:var(--cbe-primary); text-decoration:none;">研究室官網</a>
        </div>
    </div>

    <script>
        // 1. 抓取網址參數
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        const suggestionBox = document.getElementById('roleSuggestion');

        // 2. 針對不同單位給予不同建議
        const suggestions = {
            'architect': '<b>【設計規劃端建議】</b><br>請著重於建築量體配置對風場的誘導作用，思考如何透過開窗位置達成自然通風改善。',
            'interior_designer': '<b>【設計規劃端建議】</b><br>建議關注室內隔間對氣流路徑的阻擋，並結合熱源分布評估是否有熱累積現象。',
            'urban_planner': '<b>【設計規劃端建議】</b><br>請評估大尺度建築群所造成的風洞效應，並思考外部風速對行人舒適度的影響。',
            'developer': '<b>【營建管理端建議】</b><br>初步診斷可用於評估公設空間舒適度，作為建案銷售價值與微氣候模擬之依據。',
            'construction': '<b>【營建管理端建議】</b><br>建議確認現場施工條件是否符合通風設計路徑，避免二次裝修造成氣流受阻。',
            'interior_fitout': '<b>【營建管理端建議】</b><br>裝修材料與家具擺放會改變微氣候，請記錄既有室內空調與開窗的耦合現況。',
            'management': '<b>【營建管理端建議】</b><br>著重於營運期間的能源效率與通風現況，這有助於後續智慧監測系統的佈署。',
            'general_user': '<b>【使用者建議】</b><br>請根據您的真實感受勾選問題，這將協助專業團隊進行精確的流體動力學模擬分析。'
        };

        // 3. 顯示對應建議
        suggestionBox.innerHTML = suggestions[role] || '<b>【SMAD 提醒】</b><br>請完整填寫現況觀測資訊，以進行後續物理場邊界設定。';

        function submitDiagnostic() {
            alert('【SMAD 1.1 S 診斷完成】\n開發者：Liwei, Tsai\n建議：請轉至 Step 1.2 進行多元耦合邊界設定。');
        }
    </script>
</body>
</html>
