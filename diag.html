<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAD 1.1 S | Step 1.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding-bottom: 50px; }
        .container { max-width: 500px; margin-top: 20px; }
        .step-title { color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); padding-left: 12px; margin: 25px 0 12px 0; }
        .btn-submit { background: var(--cbe-primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background-color: var(--cbe-primary);"><div class="container-fluid"><span class="navbar-brand mb-0 h1">Step 1.2 問題來源整理</span></div></nav>
    <div class="container">
        <div class="card p-4 shadow-sm" style="border-radius: 20px; border:none;">
            <div class="step-title">問題來源描述 (Source)</div>
            <p class="small text-muted">請詳細描述該空間發生的環境問題：</p>
            <textarea class="form-control" id="sourceDesc" rows="6" placeholder="例如：夏季午後西曬嚴重、窗戶開啟率低..."></textarea>
            <button type="button" class="btn btn-submit" onclick="goToDataPage()">進入空間資料收集</button>
        </div>
    </div>
    <script>
        function goToDataPage() {
            const currentURL = new URLSearchParams(window.location.search);
            const source = document.getElementById('sourceDesc').value || "無描述";
            // 附加第二頁的描述，傳給第三頁
            currentURL.append('source', source);
            window.location.href = `data.html?` + currentURL.toString();
        }
    </script>
</body>
</html>
