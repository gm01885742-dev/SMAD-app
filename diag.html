<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAD 1.1 S | 目的與來源</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding-bottom: 50px; }
        .container { max-width: 500px; margin-top: 20px; }
        .step-title { color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); padding-left: 12px; margin: 25px 0 12px 0; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-submit { background: var(--cbe-primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background-color: var(--cbe-primary);"><div class="container-fluid"><span class="navbar-brand mb-0 h1" onclick="history.back()"><i class="bi bi-chevron-left"></i> SMAD 1.1 S | 目的與來源</span></div></nav>
    <div class="container">
        <div class="card p-4">
            <div class="step-title"><i class="bi bi-target"></i> 模擬目的確認 (Purpose)</div>
            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="p1" checked><label class="form-check-label">驗證設計方案有效性</label></div>
            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="p2"><label class="form-check-label">找出環境失效原因</label></div>
            <div class="form-check mb-4"><input class="form-check-input" type="checkbox" id="p3"><label class="form-check-label">輔助 AIGC 優化</label></div>
            
            <div class="step-title"><i class="bi bi-chat-left-dots-fill"></i> How－問題來源 (Source)</div>
            <textarea class="form-control" id="sourceDesc" rows="4" placeholder="描述現況問題..."></textarea>
            <button type="button" class="btn btn-submit" onclick="goToDataPage()">最後一步：基本資料收集 <i class="bi bi-arrow-right"></i></button>
        </div>
    </div>
    <script>
        function goToDataPage() {
            const role = new URLSearchParams(window.location.search).get('role');
            window.location.href = `data.html?role=${role}`;
        }
    </script>
</body>
</html>
