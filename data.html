<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAD 1.1 S | 資料收集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding-bottom: 50px; }
        .container { max-width: 500px; margin-top: 20px; }
        .step-title { color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); padding-left: 12px; margin: 25px 0 12px 0; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-finish { background: linear-gradient(135deg, #28a745, #1e7e34); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background-color: #28a745;">
        <div class="container-fluid"><span class="navbar-brand mb-0 h1" onclick="history.back()"><i class="bi bi-chevron-left"></i> SMAD 1.1 S | 資料收集</span></div>
    </nav>
    <div class="container">
        <div class="card p-4">
            <div class="step-title">1. 空間幾何 (Geometry)</div>
            <div class="input-group mb-2"><span class="input-group-text">長</span><input type="number" id="l" class="form-control"><span class="input-group-text">寬</span><input type="number" id="w" class="form-control"></div>
            <div class="input-group mb-3"><span class="input-group-text">高</span><input type="number" id="h" class="form-control"></div>
            <div class="step-title">2. 開口與熱源 (Sources)</div>
            <div class="mb-2"><label class="small">窗戶數量</label><input type="number" id="win" class="form-control" value="0"></div>
            <div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" id="pc"><label class="form-check-label">包含電腦熱源</label></div>
            <button type="button" class="btn btn-finish" onclick="downloadData()">完成並儲存資料到電腦</button>
        </div>
    </div>
    <script>
        function downloadData() {
            const role = new URLSearchParams(window.location.search).get('role');
            const data = { role, geometry: { l: document.getElementById('l').value, w: document.getElementById('w').value, h: document.getElementById('h').value }, windows: document.getElementById('win').value, pc: document.getElementById('pc').checked, time: new Date().toLocaleString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `SMAD_Data_${Date.now()}.json`;
            a.click();
            alert('資料已下載！');
        }
    </script>
</body>
</html>
