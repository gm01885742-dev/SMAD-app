<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAD 1.1 S | 雲端存檔</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cbe-primary: #1a2a6c; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 500px; margin-top: 20px; }
        .btn-cloud { background: linear-gradient(135deg, #28a745, #1e7e34); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background-color: #28a745;"><div class="container-fluid"><span class="navbar-brand mb-0 h1">最終資料存檔</span></div></nav>
    <div class="container">
        <div class="card p-4 shadow-sm" style="border-radius: 20px; border:none;">
            <div class="alert alert-info small">點擊下方按鈕將所有診斷資料上傳至 CBE studio 雲端資料庫。</div>
            <button type="button" id="uploadBtn" class="btn btn-cloud" onclick="uploadToCloud()">
                <span id="btnText">確認並上傳雲端資料庫</span>
                <span id="btnLoading" class="spinner-border spinner-border-sm d-none"></span>
            </button>
            <div class="text-center mt-4"><a href="https://www.cbesstudio.com/" target="_blank" style="text-decoration:none; color:#1a2a6c; font-weight:bold;">CBE studio 研究室網址</a></div>
        </div>
    </div>
    <script>
        async function uploadToCloud() {
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const uploadBtn = document.getElementById('uploadBtn');

            // 1. 從網址抓取前兩頁的所有資料
            const params = new URLSearchParams(window.location.search);
            const data = {
                developer: "Liwei, Tsai",
                role: params.get('role'),
                scale: params.get('scale'),
                location: params.get('loc'),
                env_type: params.get('env'),
                source_desc: params.get('source'),
                timestamp: new Date().toLocaleString()
            };

            // 2. 您的 Google Script 網址
            const scriptURL = "https://script.google.com/macros/s/AKfycby6mXjlzdTxvohlSHCpoQMTUAji7snrTykZE2gl7xt0qgHB0G9hvlLVE4xJvZT3z7IS/exec";

            // UI 狀態切換
            btnText.innerText = "上傳中...";
            btnLoading.classList.remove('d-none');
            uploadBtn.disabled = true;

            try {
                // 使用 fetch 發送到 Google Sheets
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // 必須使用 no-cors 模式
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                alert('🎉 存檔成功！資料已飛進您的 Google 試算表。');
                btnText.innerText = "上傳成功！";
                btnLoading.classList.add('d-none');
            } catch (error) {
                console.error('Error!', error.message);
                alert('存檔失敗，請檢查網路。');
                btnText.innerText = "重新嘗試上傳";
                btnLoading.classList.add('d-none');
                uploadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
