<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBE studio | SMAD 1.1 入口</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { 
            background-color: #f8f9fa; 
            font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .container { max-width: 450px; padding: 20px; }
        .cbe-brand-header {
            background: linear-gradient(135deg, var(--cbe-primary), #2a4858);
            color: white; padding: 30px 20px; border-radius: 20px 20px 0 0; text-align: center;
        }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-next { 
            background: var(--cbe-primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; width: 100%; margin-top: 20px;
            transition: 0.3s;
        }
        .btn-next:hover { background: #0d1740; transform: translateY(-2px); }
        .footer-info { text-align: center; margin-top: 25px; color: #6c757d; font-size: 0.85rem; line-height: 1.6; }
        .developer-tag { color: var(--cbe-primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow">
            <div class="cbe-brand-header">
                <div class="h4 fw-bold">CBE studio 數位診斷系統 </div>
                <div class="small">SMAD 1.1 S｜Situation / Source</div>
            </div>
            
            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-person-bounding-box" style="font-size: 3rem; color: var(--cbe-primary);"></i>
                    <h5 class="mt-2 fw-bold">請先選取您的身份</h5>
                    <p class="text-muted small">Who - 使用者對象識別</p>
                </div>
                
                <select class="form-select form-select-lg mb-3" id="userRole">
                    <optgroup label="設計規劃端">
                        <option value="architect">建築師</option>
                        <option value="interior_designer">室內設計師</option>
                        <option value="urban_planner">都市計畫師</option>
                    </optgroup>
                    <optgroup label="營建管理端">
                        <option value="developer">建設公司</option>
                        <option value="construction">營造公司</option>
                        <option value="interior_fitout">室內裝修</option>
                        <option value="management">管理單位</option>
                    </optgroup>
                    <optgroup label="其他">
                        <option value="general_user">一般使用者</option>
                    </optgroup>
                </select>

                <button class="btn btn-next" onclick="goToNextPage()">進入診斷流程 <i class="bi bi-arrow-right"></i></button>
            </div>
        </div>

        <div class="footer-info">
            <div class="developer-tag">Developer: CBE studio | Liwei, Tsai</div>
            © 2026 CBE STUDIO | <a href="https://www.cbesstudio.com/" target="_blank" style="color:var(--cbe-primary); text-decoration:none; font-weight:bold;">研究室官網</a><br>
            <small>逢甲大學 建築專業學院 博士班研究成果</small>
        </div>
    </div>

    <script>
        // 跳轉邏輯
        function goToNextPage() {
            const role = document.getElementById('userRole').value;
            // 導向 diag.html 並傳遞角色參數
            window.location.href = `diag.html?role=${role}`;
        }

        // Service Worker 註冊與自動更新檢測
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(registration) {
                    // 檢查是否有新版本在等待
                    registration.onupdatefound = function() {
                        const installingWorker = registration.installing;
                        installingWorker.onstatechange = function() {
                            if (installingWorker.state === 'installed') {
                                if (navigator.serviceWorker.controller) {
                                    // 偵測到新內容，提醒使用者重新整理
                                    if(confirm("偵測到新版 SMAD 模版，是否立即更新？")) {
                                        window.location.reload();
                                    }
                                }
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
