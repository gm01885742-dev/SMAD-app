<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBE studio | SMAD 1.1 入口</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; display: flex; align-items: center; min-height: 100vh; }
        .container { max-width: 450px; }
        .cbe-brand-header {
            background: linear-gradient(135deg, var(--cbe-primary), #2a4858);
            color: white; padding: 30px 20px; border-radius: 20px 20px 0 0; text-align: center;
        }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-next { 
            background: var(--cbe-primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; width: 100%; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="cbe-brand-header">
                <div class="h4 fw-bold">CBE studio</div>
                <div class="small">SMAD 1.1 數位診斷系統</div>
            </div>
            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-person-circle" style="font-size: 3rem; color: var(--cbe-primary);"></i>
                    <h5 class="mt-2 fw-bold">請先選取您的身份</h5>
                </div>
                
                <select class="form-select form-select-lg mb-3" id="userRole">
                    <optgroup label="設計規劃端">
                        <option value="designer">室內設計師 / 建築師</option>
                        <option value="planner">都市計劃師</option>
                    </optgroup>
                    <optgroup label="營建管理端">
                        <option value="manager">建設公司 / 營造單位</option>
                        <option value="admin">裝修 / 管理單位</option>
                    </optgroup>
                </select>

                <button class="btn btn-next" onclick="goToNextPage()">進入診斷流程 <i class="bi bi-arrow-right"></i></button>
            </div>
        </div>
        <div class="text-center mt-4 small text-muted">Developer: Liwei, Tsai</div>
    </div>

    <script>
        function goToNextPage() {
            const role = document.getElementById('userRole').value;
            // 將選取的身份帶到下一頁的網址中
            window.location.href = `diag.html?role=${role}`;
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
