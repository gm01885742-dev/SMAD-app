<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBE studio | SMAD 1.1 S</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; padding-bottom: 50px; }
        .container { max-width: 500px; margin-top: 20px; }
        .cbe-brand-header { background: linear-gradient(135deg, var(--cbe-primary), #2a4858); color: white; padding: 25px 20px; border-radius: 20px 20px 0 0; text-align: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .step-title { color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); padding-left: 12px; margin: 20px 0 10px 0; font-size: 1.05rem; }
        .btn-next { background: var(--cbe-primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 25px; }
        .footer-info { text-align: center; margin-top: 25px; color: #6c757d; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow">
            <div class="cbe-brand-header"><div class="h4 fw-bold mb-0">CBE studio</div><div class="small opacity-75">SMAD 1.1 S｜數位診斷系統</div></div>
            <div class="card-body p-4">
                <form id="entryForm">
                    <div class="step-title">Who－使用者對象</div>
                    <select class="form-select mb-3" id="userRole">
                        <option value="建築師">建築師</option>
                        <option value="室內設計師">室內設計師</option>
                        <option value="室內裝修業者">室內裝修業者</option>
                        <option value="管理單位">管理單位</option>
                        <option value="一般使用者">一般使用者</option>
                    </select>
                    <div class="step-title">Where－空間與尺度</div>
                    <select class="form-select mb-2" id="scale">
                        <option value="都市尺度">都市尺度</option>
                        <option value="建築尺度">建築尺度</option>
                        <option value="室內尺度" selected>室內尺度</option>
                    </select>
                    <input type="text" class="form-control mb-3" id="location" placeholder="輸入空間名稱 (如：地下室車庫)">
                    <div class="step-title">What－環境類型</div>
                    <div class="p-3 border rounded bg-light">
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="env_type" id="e1" value="風環境" checked><label class="form-check-label" for="e1">風環境 (Wind)</label></div>
                        <div class="form-check"><input class="form-check-input" type="radio" name="env_type" id="e2" value="熱環境"><label class="form-check-label" for="e2">熱環境 (Thermal)</label></div>
                    </div>
                    <button type="button" class="btn btn-next" onclick="goToNextPage()">下一步：問題來源整理</button>
                </form>
            </div>
        </div>
        <div class="footer-info">Developer: CBE studio | Liwei, Tsai</div>
    </div>
    <script>
        function goToNextPage() {
            const role = document.getElementById('userRole').value;
            const scale = document.getElementById('scale').value;
            const loc = document.getElementById('location').value || "未命名空間";
            const env = document.querySelector('input[name="env_type"]:checked').value;
            // 將所有資訊編碼傳往第二頁
            window.location.href = `diag.html?role=${encodeURIComponent(role)}&scale=${encodeURIComponent(scale)}&loc=${encodeURIComponent(loc)}&env=${encodeURIComponent(env)}`;
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
