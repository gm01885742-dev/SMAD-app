<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBE studio | SMAD 1.1 Situation Diagnosis</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --cbe-primary: #1a2a6c; --cbe-accent: #d4a017; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 500px; margin-top: 25px; padding-bottom: 60px; }
        .cbe-brand-header {
            background: linear-gradient(135deg, var(--cbe-primary), #2a4858);
            color: white; padding: 25px 20px; border-radius: 20px 20px 0 0; text-align: center;
        }
        .studio-name { font-weight: 800; letter-spacing: 2px; font-size: 1.6rem; }
        .card { border: none; border-radius: 0 0 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .step-title { 
            color: var(--cbe-primary); font-weight: bold; border-left: 5px solid var(--cbe-accent); 
            padding-left: 12px; margin: 20px 0 12px 0; font-size: 1.1rem;
        }
        .form-select, .form-control { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
        .btn-submit { 
            background: var(--cbe-primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; margin-top: 20px; width: 100%; transition: 0.3s;
        }
        .btn-submit:hover { background: #0d1740; transform: translateY(-1px); }
        
        /* 開發者資訊樣式 */
        .footer-info { text-align: center; margin-top: 25px; color: #6c757d; font-size: 0.85rem; line-height: 1.6; }
        .developer-tag { color: var(--cbe-primary); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="cbe-brand-header">
                <div class="studio-name">CBE studio</div>
                <div class="studio-sub">氣候與建成環境研究室 | 逢甲大學</div>
            </div>
            
            <div class="card-body p-4">
                <h5 class="text-center fw-bold mb-1">SMAD 1.1 S｜Situation / Source</h5>
                <p class="text-muted text-center small mb-4">風環境模擬需求診斷與議題釐清</p>
                
                <form id="pwaForm">
